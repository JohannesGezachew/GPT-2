model:
  name_or_path: gpt2
  max_length: 1024

data:
  dataset_name: cnn_dailymail
  dataset_config: "3.0.0"
  max_article_tokens: 800
  max_summary_tokens: 160
  min_summary_ratio: 0.02
  num_proc: 4
  cache_dir: ./.cache/hf

train:
  output_dir: ./runs/pretrained
  seed: 42
  num_train_epochs: 3
  per_device_train_batch_size: 4
  per_device_eval_batch_size: 4
  gradient_accumulation_steps: 8
  learning_rate: 5.0e-5
  weight_decay: 0.1
  adam_beta1: 0.9
  adam_beta2: 0.95
  adam_epsilon: 1.0e-8
  max_grad_norm: 1.0
  lr_scheduler_type: linear
  warmup_steps: 500
  fp16: true
  logging_steps: 50
  save_steps: 2000
  eval_steps: 2000
  save_total_limit: 3
  eval_max_samples: 500

generate:
  max_new_tokens: 128
  do_sample: true
  top_p: 0.92
  top_k: 0
  temperature: 0.7
  repetition_penalty: 1.2
  no_repeat_ngram_size: 3
